<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrooveLinx — Where Bands Lock In</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(120deg,#050510,#111145,#1c1033,#050510);
background-size:400% 400%;
animation:bgmove 18s ease infinite;
margin:0;
color:white;
text-align:center;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.logo{
width:220px;
margin-bottom:10px;
}

.hero-logo{
width:420px;
margin:40px auto;
border-radius:12px;
box-shadow:0 25px 60px rgba(0,0,0,.6);
}

h1{
font-size:42px;
margin-top:10px;
}

.subtitle{
font-size:18px;
opacity:.8;
max-width:650px;
margin:auto;
}

.button{
display:inline-block;
padding:14px 24px;
margin-top:20px;
background:linear-gradient(135deg,#ffcc33,#ff6a3c,#ff3c7f);
border-radius:30px;
color:black;
font-weight:bold;
text-decoration:none;
}

.features{
margin-top:80px;
}

.features h2{
margin-bottom:40px;
}

.screens{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.screens img{
width:100%;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

footer{
margin-top:80px;
opacity:.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<img src="images/groovelinx_clean_logo.png" class="logo">

<h1>Where Bands Lock In</h1>

<p class="subtitle">
GrooveLinx is the command center for modern jam bands.
Learn songs faster, build smarter setlists, rehearse efficiently,
and keep your entire band aligned in one place.
</p>

<a class="button" href="https://drewmerrill.github.io/deadcetera/" target="_blank">
🎸 View Live Demo
</a>

<img src="images/groovelinx_psychedelic_logo.png" class="hero-logo">

<div class="features">

<h2>What GrooveLinx Does</h2>

<div class="screens">

<img src="images/groovelinx_screenshot_1.png">
<img src="images/groovelinx_screenshot_2.png">
<img src="images/groovelinx_screenshot_3.png">
<img src="images/groovelinx_screenshot_4.png">
<img src="images/groovelinx_screenshot_5.png">

</div>

</div>

<footer>

<p>GrooveLinx © 2026 — Built for the jam band community</p>

</footer>

</div>

</body>
</html>
